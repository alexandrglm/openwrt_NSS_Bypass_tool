name: Build NSS-Switch APK v1.0.1 (Hybrid C)

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'build_1.0.1_aarch64/**'
      - 'build_1.0.1_aarch64/APKBUILD'
  workflow_dispatch:

jobs:
  compile-c:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cross-compiler for aarch64
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Compile nss-ct-dump for aarch64
        run: |
          cd build_1.0.1_aarch64/nss-ct-dump
          aarch64-linux-gnu-gcc -Wall -O2 -static -o nss-ct-dump_aarch64 nss-ct-dump.c
          file nss-ct-dump_aarch64

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nss-ct-dump-binary
          path: build_1.0.1_aarch64/nss-ct-dump/nss-ct-dump_aarch64
          retention-days: 1

  build-apk:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
    needs: compile-c
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download compiled binary
        uses: actions/download-artifact@v4
        with:
          name: nss-ct-dump-binary
          path: build_1.0.1_aarch64/nss-ct-dump/

      - name: Create bin directory and copy binary
        run: |
          cd build_1.0.1_aarch64
          mkdir -p source/usr/bin/NSS-Switch/bin
          cp nss-ct-dump/nss-ct-dump_aarch64 source/usr/bin/NSS-Switch/bin/
          ls -la source/usr/bin/NSS-Switch/bin/

      - name: Setup APK build environment
        run: apk add --no-cache alpine-sdk abuild

      - name: Setup signing keys
        run: |
          mkdir -p ~/.abuild
          echo "${{ secrets.RSA_PRIVATE_KEY }}" > ~/.abuild/nss-switch.rsa
          echo "${{ secrets.RSA_PUBLIC_KEY }}" > ~/.abuild/nss-switch.rsa.pub
          cp ~/.abuild/nss-switch.rsa.pub /etc/apk/keys/
          chmod 600 ~/.abuild/nss-switch.rsa
          chmod 644 ~/.abuild/nss-switch.rsa.pub
          printf 'PACKAGER_PRIVKEY=%s/.abuild/nss-switch.rsa\nPACKAGER="Alexander Gomez <alexandrglm@proton.me>"\n' "$HOME" > ~/.abuild/abuild.conf

      - name: Build APK
        run: |
          cd build_1.0.1_aarch64
          git config --global --add safe.directory "$(pwd)"
          tar czf source.tar.gz source/
          abuild -F checksum
          abuild -F -r

      - name: Get version
        id: get_version
        run: |
          cd build_1.0.1_aarch64
          VERSION=$(grep "^pkgver=" APKBUILD | cut -d= -f2 | tr -d '"')
          REL=$(grep "^pkgrel=" APKBUILD | cut -d= -f2 | tr -d '"')
          echo "VERSION=${VERSION}-r${REL}" >> $GITHUB_OUTPUT
          echo "PKG_VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}-aarch64
          name: NSS-Switch v${{ steps.get_version.outputs.VERSION }} (aarch64)
          body: |
            ## NSS-Switch v1.0.1

            Compiled version for `aarch64` architecture (`ipq807x`).

            ### CHANGELOG
            - Hybrid support: shell for UI, C for heavy-duty functions
                * Migrated `conntrack.sh` > `ct_dump_all_full()` to C (highly improved performance)

            > 📌 See [`CHANGELOG.md`](https://github.com/alexandrglm/openwrt_NSS_Bypass_tool/blob/main/CHANGELOG.md) for detailed history.

            ## Installation on OpenWrt
            ### Pre-requisites
            - OpenWrt 25.12+ with NSS (QCA SSDK) enabled
            - Full `conntrack` / `nftables` support

            ### APK file
            ```bash
            apk add nss-switch-${{ steps.get_version.outputs.PKG_VERSION }}-aarch64.apk --allow-untrusted
            ```

            > RSA public key is included in the repository/releases so it can be added to `/etc/apk/keys/` directly, making the `--allow-untrusted` flag unnecessary.

          files: |
            /github/home/packages/**/*.apk
            ~/.abuild/nss-switch.rsa.pub
          prerelease: true
          draft: false

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nss-switch-apk
          path: /github/home/packages/**/*.apk
          if-no-files-found: error
